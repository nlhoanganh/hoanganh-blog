apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # !! Replace "my-blog-project" with your actual GCP project ID
          image: us-central1-docker.pkg.dev/my-blog-project/blog/frontend:v1
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"      # nginx is very lightweight
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
